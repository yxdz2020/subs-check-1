name: Sync Release

on:
  # 1. 允许手动触发
  workflow_dispatch:
    inputs:
      # 添加一个输入框
      tag:
        description: '要同步的特定版本标签 (例如 v1.0.0)。留空则同步最新版。'
        required: false
        default: '' # 默认值为空字符串
        
  # 2. 定时任务（保持不变）
  schedule:
    - cron: '0 3 * * *' # 每天凌晨3点自动运行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # !!! 重要：授予创建 Release 的权限 !!!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync Release using gh CLI
        env:
          # --- 配置区域 START ---
          # !!! 请修改为你 fork 的上游仓库 (格式: 作者/仓库名)
          UPSTREAM_REPO: "upstream-owner/upstream-repo"
          # --- 配置区域 END ---
          
          # 从 workflow_dispatch 的输入中获取 tag 值
          SPECIFIC_TAG: ${{ inputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
        run: |
          SYNC_TAG="" # 最终确定要同步的 tag
          
          # 1. 判断是同步指定版本还是最新版本
          # -n "$VAR" 检查变量是否非空
          if [ -n "$SPECIFIC_TAG" ]; then
            echo "已指定同步版本: $SPECIFIC_TAG"
            SYNC_TAG=$SPECIFIC_TAG
          else
            echo "未指定版本，将获取上游 [$UPSTREAM_REPO] 的最新 Release..."
            # 获取上游最新 Release 的 Tag
            SYNC_TAG=$(gh release view -R $UPSTREAM_REPO --json tagName -q .tagName || echo "")
            if [ -z "$SYNC_TAG" ]; then
              echo "错误：无法获取上游 Release，可能上游没有发布任何 Release。"
              exit 0 # 正常退出
            fi
            echo "发现上游最新版本: $SYNC_TAG"
          fi

          # 2. 检查这个 Tag 在你自己的仓库里是否已经存在
          # gh release view "$SYNC_TAG" 会在 release 存在时返回 0，不存在时返回非 0
          if gh release view "$SYNC_TAG" >/dev/null 2>&1; then
            echo "版本 [$SYNC_TAG] 在你的仓库已存在，无需同步。"
            exit 0 # 正常退出
          fi

          echo "准备同步新版本 [$SYNC_TAG]..."

          # 3. 下载上游的所有附件 (Assets) 到临时目录
          mkdir -p temp_assets
          # 尝试下载附件，|| true 确保在没有附件时脚本也不会失败
          gh release download "$SYNC_TAG" -R $UPSTREAM_REPO -D temp_assets -p "*" || echo "提示：该 Release [$SYNC_TAG] 可能没有附件，仅同步文字内容。"

          # 4. 获取上游的标题和正文内容
          REPO_TITLE=$(gh release view "$SYNC_TAG" -R $UPSTREAM_REPO --json name -q .name)
          REPO_BODY=$(gh release view "$SYNC_TAG" -R $UPSTREAM_REPO --json body -q .body)

          # 5. 在你的仓库创建同名 Release 并上传附件
          echo "正在创建 Release [$SYNC_TAG]..."
          # temp_assets/* 会自动展开所有下载的附件
          gh release create "$SYNC_TAG" temp_assets/* \
            --title "$REPO_TITLE" \
            --notes "Synced from $UPSTREAM_REPO. Original release notes:

          $REPO_BODY"

          echo "同步完成！版本 [$SYNC_TAG] 已发布。"
