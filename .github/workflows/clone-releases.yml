name: Sync Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '同步特定版本标签(例如 v1.0.0)。留空则同步最新版。'
        required: false
        default: ''
        
  schedule:
    - cron: '0 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予创建 Release 的权限
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync Release using gh CLI
        env:
          # !!! 确保这里是你正确的上游仓库 !!!
          UPSTREAM_REPO: "beck-8/subs-check" 
          SPECIFIC_TAG: ${{ inputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
        run: |
          SYNC_TAG="" # 最终确定要同步的 tag
          LATEST_FLAG="--latest=false" # !!! 新增：默认不设为 "Latest" !!!
          
          # 1. 判断是同步指定版本还是最新版本
          if [ -n "$SPECIFIC_TAG" ]; then
            echo "已指定同步版本: $SPECIFIC_TAG"
            SYNC_TAG=$SPECIFIC_TAG
            # 手动指定版本，我们假定它不是最新的
            LATEST_FLAG="--latest=false"
          else
            echo "未指定版本，将获取上游 [$UPSTREAM_REPO] 的最新 Release..."
            SYNC_TAG=$(gh release view -R $UPSTREAM_REPO --json tagName -q .tagName || echo "")
            
            if [ -z "$SYNC_TAG" ]; then
              echo "错误：无法获取上游 Release。"
              exit 0
            fi
            
            echo "发现上游最新版本: $SYNC_TAG"
            # 自动获取最新版，我们才将其设为 "Latest"
            LATEST_FLAG="--latest=true" # !!! 修改点：自动模式下设为 true !!!
          fi

          # 2. 检查这个 Tag 在你自己的仓库里是否已经存在
          if gh release view "$SYNC_TAG" >/dev/null 2>&1; then
            echo "版本 [$SYNC_TAG] 在你的仓库已存在，无需同步。"
            exit 0
          fi

          echo "准备同步新版本 [$SYNC_TAG]..."

          # 3. 下载上游的所有附件
          mkdir -p temp_assets
          gh release download "$SYNC_TAG" -R $UPSTREAM_REPO -D temp_assets -p "*" || echo "提示：该 Release [$SYNC_TAG] 可能没有附件。"

          # 4. 获取上游的标题和正文内容
          REPO_TITLE=$(gh release view "$SYNC_TAG" -R $UPSTREAM_REPO --json name -q .name)
          REPO_BODY=$(gh release view "$SYNC_TAG" -R $UPSTREAM_REPO --json body -q .body)

          # 5. 在你的仓库创建同名 Release
          echo "正在创建 Release [$SYNC_TAG] (设为 Latest: ${LATEST_FLAG})..."
          
          # !!! 修改点：在末尾添加了 $LATEST_FLAG !!!
          gh release create "$SYNC_TAG" temp_assets/* \
            --title "$REPO_TITLE" \
            --notes "Synced from $UPSTREAM_REPO. Original release notes:

          $REPO_BODY" \
            $LATEST_FLAG

          echo "同步完成！版本 [$SYNC_TAG] 已发布。"
